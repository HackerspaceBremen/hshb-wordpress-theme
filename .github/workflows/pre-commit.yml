name: pre-commit

on:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
      - name: Install dependencies
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
      - uses: pre-commit/action@v3.0.1
